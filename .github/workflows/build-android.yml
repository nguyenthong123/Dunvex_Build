name: Build Android APK

on:
  push:
    branches: [mobile-capacitor]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build APK (debug)
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Locate and Upload APK
        run: |
          echo "Searching for APK..."
          find android -name "*.apk" -type f
          APK=$(find android -name "*.apk" -type f | head -1)
          echo "APK=$APK"
          if [ -n "$APK" ]; then
            mkdir -p upload
            cp "$APK" upload/dunvex-build-debug.apk
            echo "APK copied to upload/"
          else
            echo "ERROR: No APK found!"
            find android -type f | head -50
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dunvex-build-debug
          path: upload/dunvex-build-debug.apk
